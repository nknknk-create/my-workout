<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myフィットネスレコーダー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen pb-12">

    <header class="bg-blue-600 text-white shadow-md p-4 mb-6">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider">🏋️‍♂️ Myフィットネスレコーダー</h1>
            <span class="text-sm bg-blue-700 px-3 py-1 rounded-full">モチベーションUP版</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="space-y-6">
            
            <section class="bg-gradient-to-br from-amber-500 to-orange-600 text-white p-5 rounded-xl shadow-md">
                <h2 class="text-xs font-bold uppercase tracking-wider opacity-80 mb-2">トレーニング継続ステータス</h2>
                <div class="flex justify-around items-center text-center">
                    <div>
                        <span class="block text-xs opacity-90">現在の連続</span>
                        <span class="text-3xl font-black" id="currentStreak">0</span><span class="text-xs font-bold"> 日連続</span>
                    </div>
                    <div class="border-l border-white/20 h-8"></div>
                    <div>
                        <span class="block text-xs opacity-90">過去最高</span>
                        <span class="text-3xl font-black" id="maxStreak">0</span><span class="text-xs font-bold"> 日</span>
                    </div>
                </div>
                <div class="mt-3 text-center text-[11px] bg-white/10 py-1 rounded-lg" id="streakMessage">
                    今日もお疲れ様です！記録をつけましょう！
                </div>
            </section>

            <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold mb-4 text-slate-700 border-b pb-2">今日の記録</h2>
                <form id="logForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">日付</label>
                        <input type="date" id="dateInput" required class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">腕立て伏せ (回)</label>
                        <input type="number" id="pushupsInput" min="0" placeholder="0" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">有酸素運動 (分)</label>
                        <input type="number" id="cardioInput" min="0" placeholder="0" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg transition duration-200 shadow-md">
                        記録を保存する
                    </button>
                </form>
            </section>

            <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-sm font-bold mb-3 text-slate-700 border-b pb-2">iPhoneへのテキスト保存</h2>
                <div class="grid grid-cols-1 gap-2">
                    <button onclick="exportToText()" class="w-full bg-slate-700 hover:bg-slate-800 text-white text-xs font-bold py-2.5 rounded-lg transition shadow-sm text-center">
                        📥 データをテキストで保存
                    </button>
                    <label class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-bold py-2.5 rounded-lg transition shadow-sm text-center cursor-pointer border border-slate-300 block">
                        📤 テキストからデータを復元
                        <input type="file" id="importFile" accept=".txt" class="hidden" onchange="importFromText(event)">
                    </label>
                </div>
            </section>
        </div>

        <section class="md:col-span-2 space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold mb-4 text-slate-700">トレーニングの推移</h2>
                <div class="relative w-full h-64">
                    <canvas id="workoutChart"></canvas>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold mb-3 text-slate-700">過去の履歴</h2>
                <div class="overflow-x-auto max-h-60 overflow-y-auto">
                    <table class="w-full text-left text-sm text-slate-600">
                        <thead class="bg-slate-100 text-xs text-slate-700 uppercase sticky top-0">
                            <tr>
                                <th class="p-3">日付</th>
                                <th class="p-3">腕立て (回)</th>
                                <th class="p-3">有酸素 (分)</th>
                                <th class="p-3 text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script>
        let db = JSON.parse(localStorage.getItem('workoutLogs')) || [];
        let myChart = null;

        // 日本時間の正確な日付文字列を取得する補助関数 (YYYY-MM-DD)
        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            // 今日の日付を自動セット
            document.getElementById('dateInput').value = formatDate(new Date());
            renderAll();
        });

        document.getElementById('logForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const date = document.getElementById('dateInput').value;
            const pushups = parseInt(document.getElementById('pushupsInput').value) || 0;
            const cardio = parseInt(document.getElementById('cardioInput').value) || 0;

            const existingIndex = db.findIndex(item => item.date === date);
            if (existingIndex !== -1) {
                db[existingIndex] = { date, pushups, cardio };
            } else {
                db.push({ date, pushups, cardio });
            }

            db.sort((a, b) => new Date(a.date) - new Date(b.date));
            saveData();
            renderAll();

            document.getElementById('pushupsInput').value = '';
            document.getElementById('cardioInput').value = '';
        });

        function deleteLog(date) {
            if (confirm(`${date} の記録を削除しますか？`)) {
                db = db.filter(item => item.date !== date);
                saveData();
                renderAll();
            }
        }

        function saveData() {
            localStorage.setItem('workoutLogs', JSON.stringify(db));
        }

        function renderAll() {
            renderStreaks();
            renderTable();
            renderChart();
        }

        // 【新機能】連続日数の計算ロジック
        function renderStreaks() {
            if (db.length === 0) {
                document.getElementById('currentStreak').innerText = '0';
                document.getElementById('maxStreak').innerText = '0';
                document.getElementById('streakMessage').innerText = '最初の1歩を踏み出しましょう！';
                return;
            }

            // 重複排除して日付順にソート
            const dates = [...new Set(db.map(item => item.date))].sort();
            
            const todayStr = formatDate(new Date());
            const yesterdayObj = new Date();
            yesterdayObj.setDate(yesterdayObj.getDate() - 1);
            const yesterdayStr = formatDate(yesterdayObj);

            // 1. 過去最高記録の計算
            let maxStreak = 0;
            let currentTemp = 0;
            let prevDateObj = null;

            for (const dStr of dates) {
                const dObj = new Date(dStr);
                if (prevDateObj === null) {
                    currentTemp = 1;
                } else {
                    const diffTime = dObj - prevDateObj;
                    const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));
                    if (diffDays === 1) {
                        currentTemp++;
                    } else if (diffDays > 1) {
                        if (currentTemp > maxStreak) maxStreak = currentTemp;
                        currentTemp = 1;
                    }
                }
                prevDateObj = dObj;
            }
            if (currentTemp > maxStreak) maxStreak = currentTemp;

            // 2. 現在の連続記録の計算
            let currentStreak = 0;
            const lastDateStr = dates[dates.length - 1];

            // 最後の記録が「今日」または「昨日」の場合のみカウントする
            if (lastDateStr === todayStr || lastDateStr === yesterdayStr) {
                let checkObj = new Date(lastDateStr);
                while (true) {
                    const checkStr = formatDate(checkObj);
                    if (dates.includes(checkStr)) {
                        currentStreak++;
                        checkObj.setDate(checkObj.getDate() - 1); // 1日前へ
                    } else {
                        break;
                    }
                }
            }

            // 画面に数値を反映
            document.getElementById('currentStreak').innerText = currentStreak;
            document.getElementById('maxStreak').innerText = maxStreak;

            // メッセージの切り替え
            const msgArea = document.getElementById('streakMessage');
            if (lastDateStr === todayStr) {
                msgArea.innerText = `🔥 今日の分の記録完了！現在 ${currentStreak}日連続！`;
            } else if (lastDateStr === yesterdayStr) {
                msgArea.innerText = `⚠️ 昨日は継続中！今日の記録を忘れないで！`;
            } else {
                msgArea.innerText = `継続が途切れてしまいました。今日から再スタート！`;
            }
        }

        function renderTable() {
            const tbody = document.getElementById('historyTableBody');
            tbody.innerHTML = '';
            [...db].reverse().forEach(item => {
                const tr = document.createElement('tr');
                tr.className = 'border-b hover:bg-slate-50';
                tr.innerHTML = `
                    <td class="p-3 font-medium">${item.date}</td>
                    <td class="p-3 text-blue-600 font-bold">${item.pushups} 回</td>
                    <td class="p-3 text-emerald-600 font-bold">${item.cardio} 分</td>
                    <td class="p-3 text-center">
                        <button onclick="deleteLog('${item.date}')" class="text-red-500 hover:text-red-700 text-xs font-bold px-2 py-1 rounded hover:bg-red-50">削除</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function renderChart() {
            const ctx = document.getElementById('workoutChart').getContext('2d');
            const labels = db.map(item => item.date);
            const pushupsData = db.map(item => item.pushups);
            const cardioData = db.map(item => item.cardio);

            if (myChart) { myChart.destroy(); }

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: '腕立て伏せ (回)', data: pushupsData, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', yAxisID: 'yPushups', tension: 0.2, borderWidth: 3 },
                        { label: '有酸素運動 (分)', data: cardioData, borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)', yAxisID: 'yCardio', tension: 0.2, borderWidth: 3 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { grid: { display: false } },
                        yPushups: { type: 'linear', position: 'left', title: { display: true, text: '腕立て (回)' }, min: 0 },
                        yCardio: { type: 'linear', position: 'right', title: { display: true, text: '有酸素 (分)' }, min: 0, grid: { drawOnChartArea: false } }
                    }
                }
            });
        }

        function exportToText() {
            if (db.length === 0) { alert('保存するデータがありません。'); return; }
            const dataStr = JSON.stringify(db, null, 2);
            const blob = new Blob([dataStr], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `workout_data_${formatDate(new Date())}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importFromText(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (Array.isArray(importedData)) {
                        if (confirm('データを読み込みますか？既存のデータに統合・上書きされます。')) {
                            importedData.forEach(newItem => {
                                const idx = db.findIndex(item => item.date === newItem.date);
                                if (idx !== -1) { db[idx] = newItem; } else { db.push(newItem); }
                            });
                            db.sort((a, b) => new Date(a.date) - new Date(b.date));
                            saveData();
                            renderAll();
                            alert('データの復元が完了しました！');
                        }
                    } else { alert('ファイル形式が正しくありません。'); }
                } catch (err) { alert('ファイルの読み込みに失敗しました。'); }
            };
            reader.readAsText(file);
            event.target.value = '';
        }
    </script>
</body>
</html>
