<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myフィットネスレコーダー Pro (iOS完全対応版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen pb-12">

    <header class="bg-blue-600 text-white shadow-md p-4 mb-6">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider">My Fitness Recorder</h1>
            <span class="text-sm bg-blue-700 px-3 py-1 rounded-full">1年で10kg減量!</span>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 space-y-6">
        
        <div class="bg-gradient-to-r from-emerald-500 to-teal-600 p-6 rounded-xl shadow-md text-white grid grid-cols-1 md:grid-cols-3 gap-4 text-center">
            <div>
                <p class="text-xs font-bold opacity-80">10kg減に必要な総消費</p>
                <p class="text-2xl font-black mt-1">72,000 <span class="text-sm font-normal">kcal</span></p>
            </div>
            <div class="border-y md:border-y-0 md:border-x border-white/20 py-2 md:py-0">
                <p class="text-xs font-bold opacity-80">これまでの累計カロリー貯金</p>
                <p class="text-3xl font-black mt-1" id="totalSavings">0 <span class="text-sm font-normal">kcal</span></p>
            </div>
            <div>
                <p class="text-xs font-bold opacity-80">10kg達成までの進捗度</p>
                <p class="text-2xl font-black mt-1" id="progressPercent">0.0 <span class="text-sm font-normal">%</span></p>
            </div>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-wrap gap-4 items-center justify-between text-sm">
            <div class="text-slate-600 font-medium">📦 データのバックアップと読み込み</div>
            <div class="flex items-center gap-3 flex-wrap">
                <button onclick="exportData()" class="bg-slate-700 hover:bg-slate-800 text-white font-bold py-1.5 px-3 rounded-lg transition duration-150">
                    📥 端末に保存 (JSON)
                </button>
                <label class="bg-blue-50 hover:bg-blue-100 text-blue-600 border border-blue-200 font-bold py-1.5 px-3 rounded-lg cursor-pointer transition duration-150">
                    📤 端末から読み込む
                    <input type="file" id="importFile" accept=".json,.txt" class="hidden" onchange="importData(event)">
                </label>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 h-fit">
                <h2 class="text-lg font-bold mb-4 text-slate-700 border-b pb-2">今日の記録</h2>
                <form id="logForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">日付</label>
                        <input type="date" id="dateInput" required class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">腕立て伏せ (回)</label>
                            <input type="number" id="pushupsInput" min="0" placeholder="20" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">有酸素運動 (分)</label>
                            <input type="number" id="cardioInput" min="0" placeholder="10" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">歩数 (目標: 7,000歩)</label>
                        <input type="number" id="stepsInput" min="0" placeholder="4000" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">昨晩の晩酌</label>
                        <select id="alcoholInput" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                            <option value="none">❌ 飲まなかった（休肝日🔥）</option>
                            <option value="social">🤝 付き合い（セーフ👍）</option>
                            <option value="home">🍺 家で飲んだ</option>
                        </select>
                    </div>

                    <div class="flex items-center pt-2">
                        <input type="checkbox" id="pilatesInput" class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500">
                        <label for="pilatesInput" class="ml-2 text-sm font-bold text-slate-600">🧘 マシンピラティスに行った</label>
                    </div>

                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg transition duration-200 shadow-md">
                        記録を保存する
                    </button>
                </form>
            </section>

            <section class="md:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold mb-4 text-slate-700">トレーニング・歩数の推移</h2>
                    <div class="relative w-full h-64">
                        <canvas id="workoutChart"></canvas>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold mb-3 text-slate-700">過去の履歴</h2>
                    <div class="overflow-x-auto max-h-60 overflow-y-auto">
                        <table class="w-full text-left text-sm text-slate-600">
                            <thead class="bg-slate-100 text-xs text-slate-700 uppercase sticky top-0">
                                <tr>
                                    <th class="p-3">日付</th>
                                    <th class="p-3">運動・歩数</th>
                                    <th class="p-3">晩酌</th>
                                    <th class="p-3">ピラティス</th>
                                    <th class="p-3 text-emerald-600 font-bold">貯金</th>
                                    <th class="p-3 text-center">操作</th>
                                </tr>
                            </thead>
                            <tbody id="historyTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script>
        let db = [];
        try {
            db = JSON.parse(localStorage.getItem('workoutLogs')) || [];
        } catch (e) {
            db = [];
        }
        let myChart = null;

        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('dateInput').value = today;
            
            sanitizeDB();
            renderAll();
        });

        function sanitizeDB() {
            if (!Array.isArray(db)) db = [];
            db = db.map(item => {
                return {
                    date: item.date || new Date().toISOString().split('T')[0],
                    pushups: parseInt(item.pushups) || 0,
                    cardio: parseInt(item.cardio) || 0,
                    steps: item.steps !== undefined ? parseInt(item.steps) : 0,
                    alcohol: item.alcohol !== undefined ? item.alcohol : 'none',
                    pilates: item.pilates !== undefined ? !!item.pilates : false
                };
            });
            saveData();
        }

        function calculateSavings(item) {
            let savings = 0;
            if (item.alcohol === 'none' || item.alcohol === 'social') {
                savings += 400;
            }
            if (item.steps >= 7000) {
                savings += 120;
            }
            if (item.pilates) {
                savings += 200;
            }
            if (item.cardio > 0 || item.pushups > 0) {
                savings += 60;
            }
            return savings;
        }

        document.getElementById('logForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const date = document.getElementById('dateInput').value;
            const logData = {
                date: date,
                pushups: parseInt(document.getElementById('pushupsInput').value) || 0,
                cardio: parseInt(document.getElementById('cardioInput').value) || 0,
                steps: parseInt(document.getElementById('stepsInput').value) || 0,
                alcohol: document.getElementById('alcoholInput').value,
                pilates: document.getElementById('pilatesInput').checked
            };

            const existingIndex = db.findIndex(item => item.date === date);
            if (existingIndex !== -1) {
                db[existingIndex] = logData;
            } else {
                db.push(logData);
            }

            db.sort((a, b) => new Date(a.date) - new Date(b.date));

            saveData();
            renderAll();

            document.getElementById('pushupsInput').value = '';
            document.getElementById('cardioInput').value = '';
            document.getElementById('stepsInput').value = '';
            document.getElementById('pilatesInput').checked = false;
        });

        function deleteLog(date) {
            if (confirm(`${date} の記録を削除しますか？`)) {
                db = db.filter(item => item.date !== date);
                saveData();
                renderAll();
            }
        }

        function saveData() {
            try {
                localStorage.setItem('workoutLogs', JSON.stringify(db));
            } catch (e) {
                alert('ブラウザへの保存に失敗しました。シークレットモード等の場合は保存できないことがあります。');
            }
        }

        function renderAll() {
            updateDashboard();
            renderTable();
            renderChart();
        }

        function updateDashboard() {
            let total = 0;
            db.forEach(item => { total += calculateSavings(item); });
            document.getElementById('totalSavings').innerHTML = `${total.toLocaleString()} <span class="text-sm font-normal">kcal</span>`;
            
            let percent = (total / 72000) * 100;
            if (percent > 100) percent = 100;
            document.getElementById('progressPercent').innerHTML = `${percent.toFixed(1)} <span class="text-sm font-normal">%</span>`;
        }

        function renderTable() {
            const tbody = document.getElementById('historyTableBody');
            tbody.innerHTML = '';

            [...db].reverse().forEach(item => {
                const tr = document.createElement('tr');
                tr.className = 'border-b hover:bg-slate-50';

                let alcoholText = '🍺 家飲み';
                if (item.alcohol === 'none') alcoholText = '🔥 休肝日';
                if (item.social || item.alcohol === 'social') alcoholText = '🤝 付き合い';

                const savings = calculateSavings(item);

                tr.innerHTML = `
                    <td class="p-3 font-medium text-xs md:text-sm">${item.date}</td>
                    <td class="p-3 text-xs">
                        <div>💪 腕立て: ${item.pushups}回 / 🏃‍♂️ 有酸素: ${item.cardio}分</div>
                        <div class="text-slate-400 mt-0.5">🐾 歩数: ${item.steps.toLocaleString()}歩</div>
                    </td>
                    <td class="p-3 text-xs font-bold">${alcoholText}</td>
                    <td class="p-3 text-xs">${item.pilates ? '🧘 済' : 'ー'}</td>
                    <td class="p-3 text-emerald-600 font-bold text-sm">+${savings} kcal</td>
                    <td class="p-3 text-center">
                        <button onclick="deleteLog('${item.date}')" class="text-red-500 hover:text-red-700 text-xs font-bold px-2 py-1 rounded hover:bg-red-50">削除</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function renderChart() {
            try {
                const ctx = document.getElementById('workoutChart').getContext('2d');
                const labels = db.map(item => item.date);
                const cardioData = db.map(item => item.cardio);
                const stepsData = db.map(item => item.steps);

                if (myChart) { myChart.destroy(); }

                myChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: '有酸素運動 (分)',
                                data: cardioData,
                                borderColor: '#10b981',
                                backgroundColor: 'rgba(16, 185, 129, 0.1)',
                                yAxisID: 'yCardio',
                                tension: 0.2,
                                borderWidth: 3
                            },
                            {
                                label: '歩数 (歩)',
                                data: stepsData,
                                borderColor: '#6366f1',
                                backgroundColor: 'rgba(99, 102, 241, 0.1)',
                                yAxisID: 'ySteps',
                                tension: 0.2,
                                borderWidth: 3,
                                type: 'bar'
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            x: { grid: { display: false } },
                            yCardio: {
                                type: 'linear',
                                position: 'left',
                                title: { display: true, text: '有酸素 (分)' },
                                min: 0
                            },
                            ySteps: {
                                type: 'linear',
                                position: 'right',
                                title: { display: true, text: '歩数 (歩)' },
                                min: 0,
                                grid: { drawOnChartArea: false }
                            }
                        }
                    }
                });
            } catch (err) {
                console.error("Chart rendering error:", err);
            }
        }

        // 📥 iOSでも確実に「ファイル」に書き出せるBlob形式のダウンロード処理
        function exportData() {
            if (db.length === 0) { alert('保存するデータがありません。'); return; }
            
            try {
                const jsonString = JSON.stringify(db, null, 2);
                // iOSで弾かれないよう、プレーンテキストのBlob（バイナリ）として生成
                const blob = new Blob([jsonString], { type: "text/plain;charset=utf-8" });
                const today = new Date().toISOString().split('T')[0];
                const fileName = `fitness_backup_${today}.json`;

                // iOS対応のダウンロード用アンカー作成
                const downloadAnchor = document.createElement('a');
                const blobUrl = URL.createObjectURL(blob);
                
                downloadAnchor.href = blobUrl;
                downloadAnchor.download = fileName;
                
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                
                // 後片付け
                setTimeout(() => {
                    document.body.removeChild(downloadAnchor);
                    URL.revokeObjectURL(blobUrl);
                }, 100);
            } catch (e) {
                alert('ファイルの生成に失敗しました: ' + e.message);
            }
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    let importedData = JSON.parse(e.target.result);
                    
                    if (Array.isArray(importedData)) {
                        if (confirm(`ファイルを読み込みます。古いデータも自動的に最新形式に変換して統合します。よろしいですか？`)) {
                            
                            importedData.forEach(newLog => {
                                const cleanLog = {
                                    date: newLog.date || new Date().toISOString().split('T')[0],
                                    pushups: parseInt(newLog.pushups) || 0,
                                    cardio: parseInt(newLog.cardio) || 0,
                                    steps: newLog.steps !== undefined ? parseInt(newLog.steps) : 0,
                                    alcohol: newLog.alcohol !== undefined ? newLog.alcohol : 'none',
                                    pilates: newLog.pilates !== undefined ? !!newLog.pilates : false
                                };

                                const index = db.findIndex(item => item.date === cleanLog.date);
                                if (index !== -1) {
                                    db[index] = cleanLog;
                                } else {
                                    db.push(cleanLog);
                                }
                            });

                            db.sort((a, b) => new Date(a.date) - new Date(b.date));
                            
                            saveData();
                            renderAll();
                            alert('データの読み込みと最新版への最適化が完了しました！');
                        }
                    } else {
                        alert('正しくないファイル形式です。JSON配列データを選択してください。');
                    }
                } catch (err) {
                    alert('ファイルの解析に失敗しました。正しいバックアップデータ（テキスト）であることを確認してください。');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }
    </script>
</body>
</html>
